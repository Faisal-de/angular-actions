name: Angular Calculator CI/CD
on:
  push:
    branches: [ main ]

jobs:
  automation-task:
    runs-on: self-hosted
    steps:
      - name: 1. Fetching code from GitHub
        uses: actions/checkout@v4
        
      - name: 2. Install Node Modules
        run: npm install

      - name: 3. Running Tests
        run: npm test -- --watch=false
        continue-on-error: true

      - name: 4. Building the Application
        run: npm run build -- --output-path=C:/releases/${{ github.sha}}

      - name: 5. IIS Switch
        shell: powershell
        run: |
          $appcmd = "$env:windir\system32\inetsrv\appcmd.exe"
          & $appcmd set vdir "MyFirstApp/" /physicalPath:"C:\releases\${{ github.sha }}"
