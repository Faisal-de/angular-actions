<div style="display: flex; justify-content: space-around; padding: 20px; font-family: sans-serif;">

  <div style="width: 300px; border: 2px solid #e3d8d8; border-radius: 10px; padding: 15px; background: #ba2c2c;">
    <h3 style="text-align: center;" >  Try Calculator </h3>
    <div style="background: #eae9e9; color: rgb(169, 199, 169); padding: 15px; text-align: right; font-size: 24px; border-radius: 5px; margin-bottom: 10px; min-height: 30px;">
      {{ display || '0' }}
    </div>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
      <button (click)="appendToDisplay('7')" style="padding: 15px;">7</button>
      <button (click)="appendToDisplay('8')" style="padding: 15px;">8</button>
      <button (click)="appendToDisplay('9')" style="padding: 15px;">9</button>
      <button (click)="appendToDisplay('/')" style="padding: 15px; background: #ff9800;">/</button>
      
      <button (click)="appendToDisplay('4')" style="padding: 15px;">4</button>
      <button (click)="appendToDisplay('5')" style="padding: 15px;">5</button>
      <button (click)="appendToDisplay('6')" style="padding: 15px;">6</button>
      <button (click)="appendToDisplay('*')" style="padding: 15px; background: #ff9800;">*</button>
      
      <button (click)="appendToDisplay('1')" style="padding: 15px;">1</button>
      <button (click)="appendToDisplay('2')" style="padding: 15px;">2</button>
      <button (click)="appendToDisplay('3')" style="padding: 15px;">3</button>
      <button (click)="appendToDisplay('-')" style="padding: 15px; background: #ff9800;">-</button>
      
      <button (click)="clearDisplay()" style="padding: 15px; background: #dcd6d5; color: white;">C</button>
      <button (click)="appendToDisplay('0')" style="padding: 15px;">0</button>
      <button (click)="calculate()" style="padding: 15px; background: #4caf50; color: white;">=</button>
      <button (click)="appendToDisplay('+')" style="padding: 15px; background: #ff9800;">+</button>
    </div>
  </div>
  <div style="width: 400px; border: 2px solid #3f51b5; border-radius: 10px; padding: 15px;">
    <h3>Calculation History</h3>
    <button (click)="clearAllHistory()" *ngIf="history.length > 0" style="margin-bottom: 10px; background: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer;">
      Clear All History
    </button>
    <ul style="list-style: none; padding: 0;">
      <li *ngFor="let item of history; let i = index" style="border-bottom: 1px solid #ddd; padding: 10px; display: flex; justify-content: space-between; align-items: center;">
        <span>{{ item }}</span>
        <button (click)="deleteHistoryItem(i)" style="background: none; border: 1px solid red; color: red; cursor: pointer; border-radius: 3px;">
          Delete
        </button>
      </li>
    </ul>
    <p *ngIf="history.length === 0" style="color: #777;">Calculate something to see history here.</p>
  </div>
</div>
